name: ESP-IDF Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.2.1
        target: esp32c3
        command: idf.py build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-bin
        path: |
          build/*.bin
          build/partition_table/*.bin
          build/bootloader/*.bin
        retention-days: 30
    
    - name: Create flash archive
      run: |
        mkdir -p flash_package
        cp build/bootloader/bootloader.bin flash_package/
        cp build/partition_table/partition-table.bin flash_package/
        cp build/*.bin flash_package/ || true
        cd flash_package && zip -r ../firmware-flash.zip .
    
    - name: Generate merged binary
      run: |
        echo "Generating merged binary using idf.py..."
        # 使用 idf.py merge-bin 生成合并的二进制文件
        idf.py merge-bin --output build/merged.bin
        echo "Merged binary generated successfully"
        ls -lh build/merged.bin
    
    - name: Upload flash package
      uses: actions/upload-artifact@v4
      with:
        name: firmware-flash-package
        path: firmware-flash.zip
        retention-days: 30
    
    - name: Upload merged binary
      uses: actions/upload-artifact@v4
      with:
        name: merged-firmware
        path: build/merged.bin
        retention-days: 30
