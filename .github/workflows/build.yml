name: ESP-IDF Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up ESP-IDF and build
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.2.1
        target: esp32c6
        command: |
          idf.py set-target esp32c6 && \
          idf.py build && \
          python3 -m esptool --chip esp32c6 merge_bin \
            -o build/merged.bin \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 4MB \
            0x0 build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/high_frequency.bin && \
          echo "Merged binary created successfully" && \
          ls -lh build/merged.bin
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-bin
        path: |
          build/*.bin
          build/partition_table/*.bin
          build/bootloader/*.bin
        retention-days: 30
    
    - name: Create flash archive
      run: |
        mkdir -p flash_package
        cp build/bootloader/bootloader.bin flash_package/
        cp build/partition_table/partition-table.bin flash_package/
        cp build/*.bin flash_package/ || true
        cd flash_package && zip -r ../firmware-flash.zip .
    
    - name: Upload flash package
      uses: actions/upload-artifact@v4
      with:
        name: firmware-flash-package
        path: firmware-flash.zip
        retention-days: 30
    
    - name: Upload merged binary
      uses: actions/upload-artifact@v4
      with:
        name: merged-firmware
        path: build/merged.bin
        retention-days: 30
